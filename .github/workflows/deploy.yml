name: Deploy to Network Solutions

# Runs on every push to main, and can also be triggered by hand from the
# Actions tab. Uploads the website files to htdocs over plain FTP using lftp.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Upload site to htdocs over FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode on;
            set ftp:prefer-epsv no;
            set net:timeout 15;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            mirror --reverse --verbose --delete=false \
              --exclude-glob .git* \
              --exclude .github/ \
              --exclude-glob .deploy-secrets* \
              --exclude-glob deploy.sh \
              --exclude-glob README.md \
              ./ /htdocs/;
          "
