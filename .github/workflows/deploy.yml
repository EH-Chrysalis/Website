name: Deploy to Network Solutions

# Runs on every push to main, and can also be triggered by hand from the
# Actions tab. Uploads ONLY the website files to htdocs over encrypted SFTP.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # Copy only the real website files into a clean folder, so repo
      # internals (.git, .github, deploy tooling) can never be uploaded.
      - name: Stage website files
        run: |
          mkdir -p dist
          cp index.html about.html approach.html styles.css script.js dist/
          ls -la dist

      - name: Upload dist/ to htdocs over SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './dist/*'
          remote_path: '/htdocs'
          sftp_only: true
